name: Fetch GitHub Starred Repos

on:
  schedule:
    # Run once per day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

# The data step commits data/stars.json, so the default read-only token must be
# upgraded to allow pushes.
permissions:
  contents: write

jobs:
  fetch-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch starred repos
        env:
          # The auto-provided GITHUB_TOKEN is forwarded as GH_TOKEN, which the
          # script reads (Bearer auth, no manual secret required).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_stars.py

      - name: Translate descriptions
        run: python3 scripts/translate_descriptions.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stars.json
          git diff --staged --quiet || git commit -m "chore: update starred repos data [skip ci]"
          git push
