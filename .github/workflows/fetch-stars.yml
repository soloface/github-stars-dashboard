name: Fetch GitHub Starred Repos

on:
  schedule:
    # Run once per day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:  # Manual trigger

jobs:
  fetch-stars:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch starred repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, time, os

          headers = {
              "Accept": "application/vnd.github.v3.star+json",
              "User-Agent": "Stars-Dashboard/1.0",
              "Authorization": f"token {os.environ.get('GH_TOKEN', '')}"
          }

          all_repos = []
          page = 1
          while True:
              url = f"https://api.github.com/users/soloface/starred?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.loads(resp.read())
                      if not data:
                          break
                      all_repos.extend(data)
                      link = resp.headers.get("Link", "")
                      if 'rel="next"' not in link:
                          break
                      page += 1
                      time.sleep(0.5)
              except Exception as e:
                  print(f"Error on page {page}: {e}")
                  break

          print(f"Fetched {len(all_repos)} starred repos")

          output = []
          for item in all_repos:
              repo = item.get("repo", item)
              output.append({
                  "full_name": repo.get("full_name", ""),
                  "html_url": repo.get("html_url", ""),
                  "description": repo.get("description") or "",
                  "stargazers_count": repo.get("stargazers_count", 0),
                  "forks_count": repo.get("forks_count", 0),
                  "language": repo.get("language") or "",
                  "starred_at": item.get("starred_at", ""),
                  "created_at": repo.get("created_at", ""),
                  "pushed_at": repo.get("pushed_at", ""),
                  "topics": repo.get("topics", []) or [],
                  "owner_avatar": repo.get("owner", {}).get("avatar_url", "")
              })

          os.makedirs("data", exist_ok=True)
          with open("data/stars.json", "w") as f:
              json.dump(output, f, indent=2, ensure_ascii=False)

          print(f"Saved {len(output)} repos to data/stars.json")
          PYEOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/stars.json
          git diff --staged --quiet || git commit -m "chore: update starred repos data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
