<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★ GitHub Stars Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Industrial Skeuomorphism — Design Tokens
   ============================================================ */
:root {
  --bg: #e0e5ec;
  --panel: #f0f2f5;
  --recessed: #d1d9e6;
  --text-primary: #2d3436;
  --text-secondary: #4a5568;
  --text-muted: #636e72;
  --accent: #ff4757;
  --accent-dark: #d43a4a;
  --accent-foreground: #ffffff;
  --shadow-dark: #babecc;
  --shadow-light: #ffffff;
  --shadow-deep: #a3b1c6;
  --shadow-card: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
  --shadow-floating: 12px 12px 24px var(--shadow-dark), -12px -12px 24px var(--shadow-light);
  --shadow-pressed: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
  --shadow-recessed: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
  --shadow-led-green: 0 0 10px 2px rgba(34,197,94,0.6);
  --shadow-led-accent: 0 0 10px 2px rgba(255,71,87,0.6);
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  --mech-easing: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* ============================================================
   Reset & Base
   ============================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  padding: 24px 24px 48px;
  position: relative;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  mix-blend-mode: overlay;
}

.container {
  max-width: 1152px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ============================================================
   Typography
   ============================================================ */
.mono { font-family: 'JetBrains Mono', monospace; }
.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
}

/* ============================================================
   Top Bar
   ============================================================ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 24px;
  margin-bottom: 28px;
  background: var(--bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.led {
  width: 10px; height: 10px;
  border-radius: var(--radius-full);
  background: #22c55e;
  box-shadow: var(--shadow-led-green);
  animation: pulse 2s ease-in-out infinite;
}

.led.accent {
  background: var(--accent);
  box-shadow: var(--shadow-led-accent);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.topbar-title {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.topbar-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-md);
  background: var(--bg);
  box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-secondary);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 150ms var(--mech-easing);
}

.topbar-link:hover {
  color: var(--accent);
}

.topbar-link:active {
  box-shadow: var(--shadow-pressed);
  transform: translateY(1px);
}

/* ============================================================
   Stats Panel (dark)
   ============================================================ */
.stats-panel {
  padding: 20px 28px;
  margin-bottom: 28px;
  background: linear-gradient(135deg, #2d3436, #2c3e50);
  border-radius: var(--radius-lg);
  box-shadow: 6px 6px 12px rgba(0,0,0,0.25), -2px -2px 6px rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  position: relative;
  overflow: hidden;
}

.stats-panel::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
}

.stat-group {
  display: flex;
  align-items: baseline;
  gap: 8px;
  position: relative;
  z-index: 1;
}

.stat-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 2.2rem;
  font-weight: 700;
  color: #ffffff;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  line-height: 1;
}

.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #a8b2d1;
}

.stat-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,0.1);
}

.stat-secondary {
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 1;
}

.lang-dot {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 500;
  color: #a8b2d1;
}

.lang-dot::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: var(--radius-full);
}

.lang-dot.typescript::before { background: #3178c6; }
.lang-dot.python::before { background: #3572A9; }
.lang-dot.javascript::before { background: #f1e05a; }
.lang-dot.shell::before { background: #89e051; }
.lang-dot.go::before { background: #00ADD8; }
.lang-dot.rust::before { background: #dea584; }
.lang-dot.cpp::before { background: #f34b7d; }
.lang-dot.html::before { background: #e34c26; }
.lang-dot.vue::before { background: #41b883; }
.lang-dot.php::before { background: #4F5D95; }
.lang-dot.other::before { background: #888; }

.sync-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  color: #636e72;
  text-align: right;
  position: relative;
  z-index: 1;
}

/* ============================================================
   Controls Row
   ============================================================ */
.controls {
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 28px;
}

.search-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-input {
  flex: 1;
  padding: 14px 20px;
  background: var(--bg);
  border: none;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-recessed);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  color: var(--text-primary);
  outline: none;
  transition: box-shadow 200ms;
}

.search-input::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

.search-input:focus {
  box-shadow: var(--shadow-recessed), 0 0 0 2px var(--accent);
}

.results-badge {
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  background: var(--recessed);
  box-shadow: var(--shadow-recessed);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Sort buttons */
.sort-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.sort-label {
  margin-right: 4px;
}

.sort-btn {
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-md);
  background: var(--bg);
  box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms var(--mech-easing);
  position: relative;
}

.sort-btn:hover {
  color: var(--accent);
}

.sort-btn.active {
  background: var(--accent);
  color: var(--accent-foreground);
  box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2);
}

.sort-btn:active:not(.active) {
  box-shadow: var(--shadow-pressed);
  transform: translateY(1px);
}

/* Language filter */
.filter-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.lang-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--bg);
  box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 150ms var(--mech-easing);
}

.lang-toggle::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: var(--radius-full);
  background: var(--text-muted);
  opacity: 0.4;
  transition: all 150ms;
}

.lang-toggle.active {
  box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
  color: var(--text-primary);
}

.lang-toggle.active::before {
  opacity: 1;
  box-shadow: 0 0 6px currentColor;
}

.lang-toggle.typescript::before { background: #3178c6; }
.lang-toggle.python::before { background: #3572A9; }
.lang-toggle.javascript::before { background: #f1e05a; }
.lang-toggle.shell::before { background: #89e051; }
.lang-toggle.go::before { background: #00ADD8; }
.lang-toggle.rust::before { background: #dea584; }
.lang-toggle.cpp::before { background: #f34b7d; }
.lang-toggle.html::before { background: #e34c26; }
.lang-toggle.vue::before { background: #41b883; }
.lang-toggle.php::before { background: #4F5D95; }
.lang-toggle.other::before { background: #888; }

.filter-all {
  padding: 5px 12px;
  border: none;
  border-radius: var(--radius-full);
  background: var(--bg);
  box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms var(--mech-easing);
}

.filter-all:active {
  box-shadow: var(--shadow-pressed);
  transform: translateY(1px);
}

/* ============================================================
   Repo Cards Grid
   ============================================================ */
.repo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-bottom: 32px;
}

@media (max-width: 1024px) { .repo-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 640px) { .repo-grid { grid-template-columns: 1fr; } }

.repo-card {
  background: var(--bg);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow-card);
  transition: all 300ms ease-out;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.repo-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-floating);
}

/* Corner screws */
.repo-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius-lg);
  background:
    radial-gradient(circle at 12px 12px, rgba(0,0,0,0.12) 2.5px, transparent 3.5px),
    radial-gradient(circle at calc(100% - 12px) 12px, rgba(0,0,0,0.12) 2.5px, transparent 3.5px),
    radial-gradient(circle at 12px calc(100% - 12px), rgba(0,0,0,0.12) 2.5px, transparent 3.5px),
    radial-gradient(circle at calc(100% - 12px) calc(100% - 12px), rgba(0,0,0,0.12) 2.5px, transparent 3.5px);
  pointer-events: none;
}

/* Vent slots */
.repo-card::after {
  content: '';
  position: absolute;
  top: 14px; right: 14px;
  width: 3px; height: 20px;
  background: var(--recessed);
  border-radius: var(--radius-full);
  box-shadow:
    var(--shadow-recessed),
    5px 0 0 var(--recessed),
    10px 0 0 var(--recessed);
  pointer-events: none;
}

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  padding-right: 20px; /* space for vent slots */
}

.card-name {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  line-height: 1.3;
  transition: color 150ms;
}

.card-name:hover { color: var(--accent); }

.card-owner {
  font-weight: 400;
  color: var(--text-muted);
}

.card-desc {
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  min-height: 2.5em;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: auto;
  padding-top: 8px;
}

.meta-item {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
}

.meta-stars {
  color: var(--accent);
  font-weight: 700;
}

.meta-forks {
  color: var(--text-secondary);
}

.meta-lang {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.meta-lang::before {
  content: '';
  width: 8px; height: 8px;
  border-radius: var(--radius-full);
}

.meta-lang.typescript::before { background: #3178c6; }
.meta-lang.python::before { background: #3572A9; }
.meta-lang.javascript::before { background: #f1e05a; }
.meta-lang.shell::before { background: #89e051; }
.meta-lang.go::before { background: #00ADD8; }
.meta-lang.rust::before { background: #dea584; }
.meta-lang.cpp::before { background: #f34b7d; }
.meta-lang.html::before { background: #e34c26; }
.meta-lang.vue::before { background: #41b883; }
.meta-lang.php::before { background: #4F5D95; }
.meta-lang.other::before { background: #888; }

.card-date {
  margin-left: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ============================================================
   Pagination
   ============================================================ */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.page-btn {
  width: 36px; height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: none;
  border-radius: var(--radius-md);
  background: var(--bg);
  box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 150ms var(--mech-easing);
}

.page-btn:hover:not(:disabled):not(.active) {
  color: var(--accent);
}

.page-btn:active:not(.active) {
  box-shadow: var(--shadow-pressed);
  transform: translateY(1px);
}

.page-btn.active {
  box-shadow: var(--shadow-pressed);
  color: var(--accent);
}

.page-btn:disabled {
  opacity: 0.35;
  cursor: default;
  box-shadow: none;
}

/* ============================================================
   Footer
   ============================================================ */
.footer {
  margin-top: 32px;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.footer .label {
  font-size: 0.65rem;
  color: var(--text-muted);
}

/* ============================================================
   States
   ============================================================ */
.state-msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 20px;
}

.state-msg .mono {
  font-size: 0.85rem;
  color: var(--text-muted);
}

.state-msg h3 {
  font-size: 1.2rem;
  margin-bottom: 8px;
  color: var(--text-secondary);
}

.state-msg p {
  font-size: 0.9rem;
  color: var(--text-muted);
}

/* Spinner */
.spinner {
  width: 40px; height: 40px;
  margin: 60px auto;
  border: 3px solid var(--recessed);
  border-top-color: var(--accent);
  border-radius: var(--radius-full);
  animation: spin 1s linear infinite;
  box-shadow: var(--shadow-card);
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ============================================================
   Responsive tweaks
   ============================================================ */
@media (max-width: 640px) {
  body { padding: 16px 12px 32px; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
  .topbar-title { font-size: 0.95rem; }
  .stats-panel { padding: 16px 18px; flex-direction: column; align-items: flex-start; }
  .stat-number { font-size: 1.6rem; }
  .sort-row { gap: 6px; }
  .sort-btn { padding: 6px 12px; font-size: 0.65rem; }
  .repo-card { padding: 16px; }
  .card-name { font-size: 0.85rem; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="led"></div>
      <span class="label">系统运行中</span>
    </div>
    <span class="topbar-title">★ 星标项目</span>
    <a class="topbar-link" href="https://github.com/soloface?tab=stars" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      GitHub →
    </a>
  </div>

  <!-- Stats Panel -->
  <div class="stats-panel" id="statsPanel">
    <div class="stat-group">
      <span class="stat-number" id="totalCount">—</span>
      <span class="stat-label">已星标</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-secondary" id="langDots"></div>
    <div class="sync-time" id="syncTime">SYNCING…</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="按名称或简介搜索…" autocomplete="off">
      <div class="results-badge" id="resultsBadge">— repos</div>
    </div>
    <div class="sort-row">
      <span class="label sort-label">排序</span>
      <button class="sort-btn active" data-sort="stars">★ 星数</button>
      <button class="sort-btn" data-sort="starred_at">点星时间</button>
      <button class="sort-btn" data-sort="created_at">发布时间</button>
      <button class="sort-btn" data-sort="pushed_at">更新时间</button>
    </div>
    <div class="filter-row" id="langFilters">
      <button class="filter-all" id="filterAll">All</button>
    </div>
  </div>

  <!-- Grid -->
  <div class="repo-grid" id="repoGrid">
    <div class="spinner"></div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="led"></div>
    <span class="label">每日自动同步 via GitHub Actions</span>
  </div>
</div>

<script>
// ============================================================
// Data & State
// ============================================================
const PER_PAGE = 12;
let repos = [];
let filtered = [];
let activeLangs = new Set();
let currentSort = 'stars';
let currentPage = 1;
let searchTerm = '';

const langColors = {
  TypeScript: '#3178c6', Python: '#3572A9', JavaScript: '#f1e05a',
  Shell: '#89e051', Go: '#00ADD8', Rust: '#dea584',
  'C++': '#f34b7d', HTML: '#e34c26', Vue: '#41b883', PHP: '#4F5D95',
};

// ============================================================
// Fetch Data
// ============================================================
async function loadData() {
  try {
    const resp = await fetch('data/stars.json');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    repos = await resp.json();
    buildLangFilters();
    applyAll();
    document.getElementById('syncTime').textContent =
      '已同步 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } catch (e) {
    document.getElementById('repoGrid').innerHTML =
      '<div class="state-msg"><h3>⚠ DATA LOAD FAILED</h3><p class="mono">' + e.message + '</p><p style="margin-top:12px"><button class="sort-btn" onclick="loadData()">RETRY</button></p></div>';
  }
}

// ============================================================
// Language Filters
// ============================================================
function buildLangFilters() {
  const counts = {};
  repos.forEach(r => { if (r.language) counts[r.language] = (counts[r.language] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  const container = document.getElementById('langFilters');
  sorted.forEach(([lang, count]) => {
    const cls = lang.toLowerCase().replace('++', 'pp').replace('#', 'sharp').replace(/\s+/g, '_');
    const colorClass = langColors[lang] ? lang.toLowerCase().replace('++', 'pp').replace(/\s+/g, '') : 'other';
    const btn = document.createElement('button');
    btn.className = 'lang-toggle ' + colorClass;
    btn.dataset.lang = lang;
    btn.textContent = lang + ' ' + count;
    btn.addEventListener('click', () => toggleLang(lang, btn));
    container.appendChild(btn);
  });
  document.getElementById('filterAll').addEventListener('click', () => {
    activeLangs.clear();
    container.querySelectorAll('.lang-toggle').forEach(b => b.classList.remove('active'));
    applyAll();
  });
}

function toggleLang(lang, btn) {
  if (activeLangs.has(lang)) {
    activeLangs.delete(lang);
    btn.classList.remove('active');
  } else {
    activeLangs.add(lang);
    btn.classList.add('active');
  }
  currentPage = 1;
  applyAll();
}

// ============================================================
// Filtering, Sorting, Pagination
// ============================================================
function applyAll() {
  // Filter
  filtered = repos.filter(r => {
    if (activeLangs.size > 0 && !activeLangs.has(r.language)) return false;
    if (searchTerm) {
      const q = searchTerm.toLowerCase();
      const descText = (r.description_zh || r.description || '').toLowerCase();
      return r.full_name.toLowerCase().includes(q) || descText.includes(q);
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    switch (currentSort) {
      case 'stars': return (b.stargazers_count || 0) - (a.stargazers_count || 0);
      case 'starred_at': return new Date(b.starred_at || 0) - new Date(a.starred_at || 0);
      case 'created_at': return new Date(b.created_at || 0) - new Date(a.created_at || 0);
      case 'pushed_at': return new Date(b.pushed_at || 0) - new Date(a.pushed_at || 0);
      default: return 0;
    }
  });

  // Update stats
  const totalPages = Math.ceil(filtered.length / PER_PAGE) || 1;
  if (currentPage > totalPages) currentPage = totalPages;

  document.getElementById('totalCount').textContent = repos.length;
  document.getElementById('resultsBadge').textContent = filtered.length + ' repos';

  // Top 5 languages in stats panel
  const langCounts = {};
  filtered.forEach(r => { if (r.language) langCounts[r.language] = (langCounts[r.language] || 0) + 1; });
  const topLangs = Object.entries(langCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const dotsEl = document.getElementById('langDots');
  dotsEl.innerHTML = topLangs.map(([l, c]) => {
    const cls = l.toLowerCase().replace('++', 'pp').replace(/\s+/g, '');
    return '<span class="lang-dot ' + (langColors[l] ? cls : 'other') + '">' + l + ' ' + c + '</span>';
  }).join('');

  // Render cards
  const start = (currentPage - 1) * PER_PAGE;
  const page = filtered.slice(start, start + PER_PAGE);
  renderCards(page);
  renderPagination(totalPages);
}

// ============================================================
// Card Rendering
// ============================================================
function renderCards(items) {
  const grid = document.getElementById('repoGrid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="state-msg"><h3>No matching repos</h3><p class="mono">Try adjusting your search or filters.</p></div>';
    return;
  }

  grid.innerHTML = items.map(r => {
    const name = r.full_name;
    const parts = name.split('/');
    const owner = parts[0];
    const repo = parts.slice(1).join('/');
    const desc = r.description_zh || r.description || '暂无简介';
    const stars = formatNum(r.stargazers_count || 0);
    const forks = formatNum(r.forks_count || 0);
    const lang = r.language;
    const langClass = lang ? lang.toLowerCase().replace('++', 'pp').replace(/\s+/g, '') : '';
    const starredDate = r.starred_at ? new Date(r.starred_at).toLocaleDateString('en-CA') : '';
    const updatedDate = r.pushed_at ? timeAgo(r.pushed_at) : '';
    const langClassResolved = langColors[lang] ? langClass : 'other';

    return '<div class="repo-card">' +
      '<div class="card-header">' +
        '<a class="card-name" href="' + escHtml(r.html_url) + '" target="_blank" rel="noopener">' +
          '<span class="card-owner">' + escHtml(owner) + '</span> / ' + escHtml(repo) +
        '</a>' +
      '</div>' +
      '<p class="card-desc">' + escHtml(desc) + '</p>' +
      '<div class="card-meta">' +
        '<span class="meta-item meta-stars">★ ' + stars + '</span>' +
        '<span class="meta-item meta-forks">⑂ ' + forks + '</span>' +
        (lang ? '<span class="meta-item meta-lang ' + langClassResolved + '">' + escHtml(lang) + '</span>' : '') +
        '<span class="card-date">' + escHtml(updatedDate) + '</span>' +
      '</div>' +
    '</div>';
  }).join('');
}

// ============================================================
// Pagination Rendering
// ============================================================
function renderPagination(totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = '';
  html += '<button class="page-btn" data-page="' + (currentPage - 1) + '"' + (currentPage === 1 ? ' disabled' : '') + '>‹</button>';

  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7) {
      if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
        html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
      } else if (i === currentPage - 2 || i === currentPage + 2) {
        html += '<button class="page-btn" disabled>…</button>';
      }
    } else {
      html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
    }
  }

  html += '<button class="page-btn" data-page="' + (currentPage + 1) + '"' + (currentPage === totalPages ? ' disabled' : '') + '>›</button>';
  el.innerHTML = html;

  el.querySelectorAll('.page-btn[data-page]').forEach(btn => {
    btn.addEventListener('click', () => {
      const p = parseInt(btn.dataset.page);
      if (p >= 1 && p <= totalPages) {
        currentPage = p;
        applyAll();
        window.scrollTo({ top: document.querySelector('.repo-grid').offsetTop - 20, behavior: 'smooth' });
      }
    });
  });
}

// ============================================================
// Event Listeners
// ============================================================
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    currentPage = 1;
    applyAll();
  });
});

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchTerm = e.target.value.trim();
    currentPage = 1;
    applyAll();
  }, 200);
});

// ============================================================
// Utilities
// ============================================================
function formatNum(n) {
  if (n >= 100000) return (n / 1000).toFixed(0) + 'k';
  if (n >= 10000) return (n / 1000).toFixed(1) + 'k';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + 'm ago';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.floor(hours / 24);
  if (days < 7) return days + 'd ago';
  if (days < 30) return Math.floor(days / 7) + 'w ago';
  return Math.floor(days / 30) + 'mo ago';
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ============================================================
// Init
// ============================================================
loadData();
</script>
