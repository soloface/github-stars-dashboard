<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>★ GitHub Stars Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="topbar-left">
      <div class="led"></div>
      <span class="label">系统运行中</span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换暗色模式" title="切换暗色模式">
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
    <span class="topbar-title">★ 星标项目</span>
    <a class="topbar-link" href="https://github.com/soloface?tab=stars" target="_blank" rel="noopener">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      GitHub →
    </a>
  </div>
  <div class="stats-panel" id="statsPanel">
    <div class="stat-group">
      <span class="stat-number" id="totalCount">—</span>
      <span class="stat-label">已星标</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-secondary" id="langDots"></div>
    <div class="sync-time" id="syncTime">SYNCING…</div>
  </div>
  <div class="controls">
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="按名称或简介搜索…" autocomplete="off">
      <div class="results-badge" id="resultsBadge">— repos</div>
    </div>
    <div class="sort-row">
      <span class="label sort-label">排序</span>
      <button class="sort-btn active" data-sort="stars">★ 星数</button>
      <button class="sort-btn" data-sort="starred_at">点星时间</button>
      <button class="sort-btn" data-sort="created_at">发布时间</button>
      <button class="sort-btn" data-sort="pushed_at">更新时间</button>
    </div>
    <div class="filter-row" id="langFilters">
      <button class="filter-all" id="filterAll">All</button>
    </div>
  </div>
  <div class="repo-grid" id="repoGrid">
    <div class="spinner"></div>
  </div>
  <div class="pagination" id="pagination"></div>
  <div class="footer">
    <div class="led"></div>
    <span class="label">每日自动同步 via GitHub Actions</span>
  </div>
</div>
<script src="js/logic.js" defer></script>
<script src="js/app.js" defer></script>
</body>
</html>
